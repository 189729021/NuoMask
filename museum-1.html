<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中原古意“方相氏” - 数字全息典藏</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入高阶字体：Noto Serif SC (宋体) & Noto Sans SC (黑体) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- MediaPipe 视觉引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                        serif: ['"Noto Serif SC"', 'serif'],
                    },
                    colors: {
                        amber: { 100: '#fef3c7', 200: '#fde68a', 900: '#78350f' }
                    }
                }
            }
        }
    </script>

    <style>
        /* 移动端禁止滑动刷新和默认触控行为 */
        body { margin: 0; overflow: hidden; background-color: #000000; touch-action: none; overscroll-behavior: none; }
        
        #bg-container { position: absolute; inset: 0; background-color: #000; z-index: 1; }
        /* 移动端视频适配 */
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: opacity 0.5s ease; filter: grayscale(20%) contrast(1.2); }
        
        /* 博物馆暗角 */
        #vignette { position: absolute; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.95) 100%); }

        #three-canvas { position: absolute; inset: 0; z-index: 2; outline: none; touch-action: none; }
        
        /* 响应式 UI 层 */
        #ui-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 1.5rem; }
        @media (min-width: 768px) { #ui-layer { padding: 2.5rem; } }
        .interactive-ui { pointer-events: auto; }
        
        /* 博物馆展牌风面板基类 */
        .museum-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 优雅细线滑块 */
        input[type=range] { -webkit-appearance: none; background: transparent; height: 1px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%;
            background: #fde68a; cursor: pointer; margin-top: -5px;
            box-shadow: 0 0 8px rgba(253, 230, 138, 0.6);
            transition: transform 0.2s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; cursor: pointer; background: rgba(255, 255, 255, 0.2); }

        /* 平滑折叠动画 */
        #info-card { transition: max-height 0.8s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden; }
        #info-content { transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); transform-origin: top; }

        /* Loading */
        #loading { position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000000; transition: opacity 1s ease; }
        .pulse-ring { width: 40px; height: 40px; border: 1px solid rgba(253, 230, 138, 0.3); border-radius: 50%; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; margin-bottom: 2rem; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .1; transform: scale(1.5); } }
    </style>
</head>
<body class="text-gray-200 selection:bg-amber-900/50 selection:text-amber-100">

    <div id="bg-container">
        <!-- 移动端必须加 muted 属性才能自动播放摄像头 -->
        <video id="webcam" autoplay playsinline muted></video>
        <div id="vignette"></div>
    </div>

    <!-- 沉浸式启动屏 -->
    <div id="loading">
        <div class="pulse-ring"></div>
        <div class="font-serif text-lg tracking-[0.4em] text-amber-100/90 mb-2">正在提取方相氏数据</div>
        <div id="loading-text" class="text-xs text-white/40 font-sans tracking-widest">LOADING ARTIFACT DATA...</div>
        <div id="error-msg" class="text-red-400 mt-6 text-sm max-w-md text-center font-sans tracking-wide px-4"></div>
    </div>

    <canvas id="three-canvas"></canvas>

    <div id="ui-layer">
        <!-- 顶部区域 -->
        <div class="flex flex-col md:flex-row justify-between items-start w-full pointer-events-none gap-4">
            
            <!-- 左上角：典雅标题签 -->
            <div class="flex flex-col gap-2 md:gap-4 pointer-events-auto">
                <div class="px-2">
                    <h1 class="font-serif text-2xl md:text-3xl lg:text-4xl text-amber-100/90 tracking-[0.2em] font-light mb-1 drop-shadow-md">方相氏</h1>
                    <div class="flex items-center gap-2 md:gap-3">
                        <div class="h-px w-4 md:w-6 bg-amber-200/50"></div>
                        <p class="font-sans text-[9px] md:text-[10px] text-white/50 tracking-[0.2em] md:tracking-[0.3em] whitespace-nowrap">中原古意 / 全息傩面</p>
                    </div>
                </div>

                <!-- 极简状态指示 -->
                <div id="status-badge" class="flex items-center gap-2 px-2 opacity-60 transition-opacity duration-1000">
                    <div class="w-1.5 h-1.5 rounded-full bg-amber-200 animate-pulse"></div>
                    <span id="status-text" class="font-sans text-[9px] md:text-[10px] text-amber-100/60 tracking-[0.1em] uppercase">初始化视觉交互...</span>
                </div>
            </div>

            <!-- 右上角：博物馆导览牌 -->
            <div id="info-card" class="interactive-ui museum-panel p-1 w-full md:w-[280px] rounded-xl md:rounded-none shadow-2xl flex flex-col" style="max-height: 500px;">
                <div id="toggle-info-btn" class="px-4 md:px-5 py-3 md:py-4 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-colors border-b border-transparent">
                    <h2 class="font-serif text-[11px] md:text-xs font-medium tracking-[0.2em] text-amber-100/80">交互导览</h2>
                    <svg id="toggle-icon" class="w-3.5 h-3.5 text-white/40 transition-transform duration-700 transform rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                
                <div id="info-content" class="px-4 md:px-5 pb-5 md:pb-6 opacity-100 transform translate-y-0">
                    <p class="text-[10px] md:text-[11px] text-white/50 leading-relaxed mb-4 font-sans font-light tracking-wide text-justify">
                        全新双手分离算法。右平移，左旋转。请于下方展台选择控制模式。
                    </p>
                    
                    <div class="space-y-3 md:space-y-4 font-sans text-[10px] md:text-[11px] tracking-widest font-light">
                        <div class="border-t border-white/10 pt-3 md:pt-4">
                            <div class="text-[8px] md:text-[9px] text-amber-200/50 mb-2 uppercase flex items-center gap-1"><span class="text-[12px]">✋</span> 空间手势</div>
                            <div class="space-y-2 ml-1">
                                <div class="flex justify-between items-center"><span class="text-white/40">右手张开移动</span><span class="text-white/80">平移面具</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/40">左手张开移动</span><span class="text-white/80">三维旋转</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/40">单手快速捏合</span><span class="text-amber-200/80">重组形态</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/40">双手同时入画</span><span class="text-white/80">全息缩放</span></div>
                            </div>
                        </div>
                        
                        <div class="border-t border-white/10 pt-3 md:pt-4">
                            <div class="text-[8px] md:text-[9px] text-amber-200/50 mb-2 uppercase flex items-center gap-1"><span class="text-[12px]">🖱️</span> 传统触控/鼠标</div>
                            <div class="space-y-2 ml-1">
                                <div class="flex justify-between items-center"><span class="text-white/40">滑动/拖拽</span><span class="text-white/80">全景旋转</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/40">双指捏合/滚轮</span><span class="text-white/80">调节缩放</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/40">双击画面</span><span class="text-amber-200/80">重组形态</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- 底部展台控制 (Dock) -->
        <div class="interactive-ui flex justify-center w-full mt-auto">
            <div class="museum-panel px-3 py-2 md:px-4 flex flex-row items-center gap-3 md:gap-6 rounded-full md:rounded-none">
                
                <!-- 模式切换开关 -->
                <div class="flex items-center bg-black/40 rounded-full p-1 border border-white/5">
                    <button id="mode-gesture" class="px-4 md:px-5 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-sans tracking-[0.1em] border border-amber-200/40 text-amber-200 bg-amber-900/30 transition-all duration-300">
                        光学手势
                    </button>
                    <button id="mode-mouse" class="px-4 md:px-5 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-sans tracking-[0.1em] text-white/30 hover:text-white/70 transition-all duration-300 border border-transparent">
                        触控操作
                    </button>
                </div>

                <div class="hidden md:block w-px h-6 bg-white/10"></div>

                <!-- 环境透视调节器 -->
                <div class="flex items-center gap-2 md:gap-4 px-2">
                    <span class="hidden md:block font-serif text-[10px] text-white/40 tracking-widest uppercase">背景透射</span>
                    <svg class="md:hidden w-4 h-4 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <div class="w-20 md:w-32">
                        <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.4">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Import Map (CDN 直链) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const isMobile = window.innerWidth < 768;

        // ==========================================
        // UI 交互与面板折叠逻辑
        // ==========================================
        const infoCard = document.getElementById('info-card');
        const infoContent = document.getElementById('info-content');
        const toggleIcon = document.getElementById('toggle-icon');
        const toggleBtn = document.getElementById('toggle-info-btn');
        let isCardOpen = true;

        const toggleCard = () => {
            isCardOpen = !isCardOpen;
            if (isCardOpen) {
                infoContent.style.opacity = '1';
                infoContent.style.transform = 'translateY(0)';
                infoCard.style.maxHeight = '500px';
                toggleBtn.classList.remove('border-white/10');
                toggleBtn.classList.add('border-transparent');
                toggleIcon.style.transform = 'rotate(0deg)';
            } else {
                infoContent.style.opacity = '0';
                infoContent.style.transform = 'translateY(-10px)';
                infoCard.style.maxHeight = isMobile ? '45px' : '53px';
                toggleBtn.classList.remove('border-transparent');
                toggleBtn.classList.add('border-white/10');
                toggleIcon.style.transform = 'rotate(180deg)';
            }
        };

        toggleBtn.addEventListener('click', toggleCard);

        // 手机端自动快速折叠，释放屏幕空间
        setTimeout(() => { if (isCardOpen) toggleCard(); }, isMobile ? 2500 : 8000);

        // ==========================================
        // 核心配置与状态管理
        // ==========================================
        // 中原古意 方相氏 模型链接
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/189729021/-@main/764f158320e86902efc71778c83736d1-v1.glb';
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('three-canvas');
        const opacitySlider = document.getElementById('opacity-slider');
        const statusText = document.getElementById('status-text');
        const statusBadge = document.getElementById('status-badge');
        
        opacitySlider.addEventListener('input', (e) => {
            videoElement.style.opacity = e.target.value;
        });
        videoElement.style.opacity = opacitySlider.value;

        let maskGroup = new THREE.Group(); 
        const baseYOffset = -2.0; 
        
        let controlMode = 'gesture'; 
        let isHandControlling = false;
        
        // 目标与当前平滑状态
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let targetScale = 1.0;
        let currentScale = 1.0;
        let targetPosition = { x: 0, y: baseYOffset, z: 0 };
        let currentPosition = { x: 0, y: baseYOffset, z: 0 };

        // 专为右手相对平移设计的 Delta 算法参数
        let isRightPanning = false;
        let lastRightPos = { x: 0, y: 0 };

        let introPhase = 0; 
        let introStartTime = 0;

        const THEMES = [
            { type: 'particle_original' },              
            { type: 'particle_pure', hex: 0xffffff },   
            { type: 'particle_pure', hex: 0xff1111 },   
            { type: 'solid_model' }                     
        ];
        let currentThemeIndex = 0; 
        const modelData = []; 
        let lastPinchTime = 0;

        const lerp = (start, end, factor) => start + (end - start) * factor;

        const updateStatus = (msg, state = 'normal') => {
            statusText.textContent = msg;
            const dot = statusBadge.querySelector('div');
            statusBadge.style.opacity = '1';
            
            if(state === 'error') {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_#ef4444]';
                statusText.className = 'font-sans text-[9px] md:text-[10px] text-red-300 tracking-[0.1em] uppercase';
            } else if (state === 'active') {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-amber-200 animate-pulse shadow-[0_0_5px_#fde68a]';
                statusText.className = 'font-sans text-[9px] md:text-[10px] text-amber-100/80 tracking-[0.1em] uppercase';
                setTimeout(() => statusBadge.style.opacity = '0.3', 4000);
            } else {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-white/50';
                statusText.className = 'font-sans text-[9px] md:text-[10px] text-white/50 tracking-[0.1em] uppercase';
            }
        };

        const showError = (msg) => {
            const loadingWrapper = document.getElementById('loading');
            loadingWrapper.querySelector('.pulse-ring').style.display = 'none';
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('error-msg').innerHTML = msg;
        }

        // 统一形态切换器
        function triggerThemeSwitch() {
            currentThemeIndex = (currentThemeIndex + 1) % THEMES.length;
            const theme = THEMES[currentThemeIndex];
            
            modelData.forEach(data => {
                const pMat = data.pointsMat;
                const mMat = data.meshMat;

                if (theme.type === 'solid_model') {
                    mMat.opacity = 1.0; mMat.visible = true; pMat.visible = false;
                } else {
                    mMat.visible = false; pMat.visible = true;
                    if (theme.type === 'particle_original') {
                        pMat.vertexColors = data.hasVertexColors;
                        pMat.color = data.hasVertexColors ? new THREE.Color(0xffffff) : data.originalColor.clone();
                    } else {
                        pMat.vertexColors = false; pMat.color.setHex(theme.hex);
                    }
                    pMat.needsUpdate = true;
                }
            });

            targetScale = 0.6; 
            setTimeout(()=> { targetScale = 1.0 }, 150);
        }

        // ==========================================
        // Three.js 场景初始化
        // ==========================================
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0); 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5; // 将曝光度从 1.2 提亮至 1.5，实现“七分暗”效果

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enabled = false; 
        controls.minDistance = 5;
        controls.maxDistance = 30;
        controls.enablePan = false;

        // 模式切换系统
        const btnGesture = document.getElementById('mode-gesture');
        const btnMouse = document.getElementById('mode-mouse');
        const defaultBtnClass = "px-4 md:px-5 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-sans tracking-[0.1em] text-white/30 hover:text-white/70 transition-all duration-300 border border-transparent";
        const activeBtnClass = "px-4 md:px-5 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-sans tracking-[0.1em] border border-amber-200/40 text-amber-200 bg-amber-900/30 transition-all duration-300";

        function setControlMode(mode) {
            controlMode = mode;
            if (mode === 'mouse') {
                btnGesture.className = defaultBtnClass;
                btnMouse.className = activeBtnClass;
                
                controls.enabled = true;
                targetRotation = { x: 0, y: 0 };
                targetPosition = { x: 0, y: baseYOffset, z: 0 };
                targetScale = 1.0;
                
                updateStatus("触控模式已接管", 'active');
            } else {
                btnMouse.className = defaultBtnClass;
                btnGesture.className = activeBtnClass;
                
                controls.enabled = false;
                camera.position.set(0, 0, 15);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                
                updateStatus("光学手势追踪运行中", 'active');
            }
        }

        btnGesture.addEventListener('click', () => setControlMode('gesture'));
        btnMouse.addEventListener('click', () => setControlMode('mouse'));

        // 移动端/桌面端双击触控算法
        let lastTap = 0;
        canvasElement.addEventListener('touchstart', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                if (controlMode === 'mouse' && introPhase === 3) triggerThemeSwitch();
            }
            lastTap = currentTime;
        }, {passive: true});
        
        canvasElement.addEventListener('dblclick', () => {
            if (controlMode === 'mouse' && introPhase === 3) triggerThemeSwitch();
        });

        // 聚光灯光影提亮
        const ambientLight = new THREE.AmbientLight(0xfff4e6, 0.8); // 提升环境光填充暗部 (原为0.5)
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffeedd, 2.2); // 增强聚光灯质感 (原为1.8)
        directionalLight.position.set(5, 12, 6);
        scene.add(directionalLight);
        scene.add(maskGroup); 

        // ==========================================
        // 加载方相氏模型数据
        // ==========================================
        const loader = new GLTFLoader();
        
        loader.load(MODEL_URL, (gltf) => {
            try {
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material.transparent = true;
                        child.material.opacity = 1.0; 
                        child.material.needsUpdate = true;

                        const hasVertexColors = child.geometry.hasAttribute('color');
                        const origMaterialColor = child.material.color ? child.material.color.clone() : new THREE.Color(0xdddddd);

                        const pointsMat = new THREE.PointsMaterial({
                            size: 0.05, 
                            vertexColors: hasVertexColors, 
                            color: hasVertexColors ? 0xffffff : origMaterialColor,
                            transparent: true,
                            opacity: 0.0, 
                            blending: THREE.AdditiveBlending, 
                            depthWrite: false, 
                            sizeAttenuation: true 
                        });

                        const points = new THREE.Points(child.geometry, pointsMat);
                        child.add(points); 
                        
                        modelData.push({
                            mesh: child,
                            meshMat: child.material,
                            pointsMat: pointsMat,
                            hasVertexColors: hasVertexColors,
                            originalColor: origMaterialColor
                        });
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                model.position.x -= center.x;
                model.position.y -= center.y;
                model.position.z -= center.z;

                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = 8; // 将默认尺寸缩小至8以留出视觉空间
                const scaleFactor = maxDim === 0 ? 1 : targetSize / maxDim;
                
                model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                maskGroup.position.y = baseYOffset;

                // 细颗粒度算法：缩小粒子，呈现星沙质感
                modelData.forEach(data => { data.pointsMat.size = targetSize * 0.0033; });

                maskGroup.add(model);
                
                const loadingEl = document.getElementById('loading');
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.style.display = 'none', 1000);
                
                introPhase = 1;
                updateStatus("视觉模块就绪，预热追踪系统");
                initMediaPipe();

            } catch(err) {
                showError("数据解析异常: " + err.message);
            }
        }, undefined, (err) => { showError("无法获取藏品数据源。请检查网络。"); });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 全新视觉手势交互：权限安全检查拦截
        // ==========================================
        let handLostTimeout = null;

        function initMediaPipe() {
            try {
                const hands = new window.Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                // 移动端降低复杂度提升帧率
                hands.setOptions({ maxNumHands: 2, modelComplexity: isMobile ? 0 : 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                
                hands.onResults((results) => {
                    if (controlMode !== 'gesture') return;

                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        isHandControlling = true;
                        controls.enabled = false;
                        clearTimeout(handLostTimeout);

                        const detectedHands = results.multiHandLandmarks;
                        let rightHandProcessed = false;

                        // 1. 双手控制缩放优先
                        if (detectedHands.length === 2) {
                            const distance = Math.hypot(detectedHands[0][8].x - detectedHands[1][8].x, detectedHands[0][8].y - detectedHands[1][8].y);
                            targetScale = distance * 3.5; 
                            targetScale = Math.max(0.4, Math.min(targetScale, 3.0));
                            
                            // 双手时复位平移与旋转
                            targetRotation.x = 0; targetRotation.y = 0;
                            targetPosition.x = 0; targetPosition.y = baseYOffset;
                            isRightPanning = false; // 中断平移记录
                        } 
                        // 2. 单手控制（按左右侧屏幕区分操作逻辑）
                        else {
                            const hand = detectedHands[0];
                            const palm = hand[9];
                            
                            // 将 0-1 坐标系翻转为视觉坐标系 (因为视频镜像)
                            const visualX = 1.0 - palm.x;
                            const visualY = palm.y;

                            // 捏合全局检测 (换色)
                            const pinchDist = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
                            if (pinchDist < 0.05) {
                                const now = Date.now();
                                if (introPhase === 3 && now - lastPinchTime > 800) {
                                    triggerThemeSwitch();
                                    lastPinchTime = now;
                                }
                                isRightPanning = false; // 捏合时暂停平移算法
                            } 
                            else {
                                // 屏幕右侧 (visualX > 0.5) 作为右手 -> 平移 (Delta算法)
                                if (visualX > 0.5) {
                                    rightHandProcessed = true;
                                    if (!isRightPanning) {
                                        // 刚抬起右手，记录初始位置作为锚点
                                        isRightPanning = true;
                                        lastRightPos.x = visualX;
                                        lastRightPos.y = visualY;
                                    } else {
                                        // 移动中，计算差值并应用到 targetPosition
                                        const dx = visualX - lastRightPos.x;
                                        const dy = visualY - lastRightPos.y;
                                        
                                        targetPosition.x += dx * 20.0; 
                                        targetPosition.y -= dy * 15.0; // Y轴反向
                                        
                                        // 及时更新锚点
                                        lastRightPos.x = visualX;
                                        lastRightPos.y = visualY;
                                    }
                                } 
                                // 屏幕左侧 (visualX <= 0.5) 作为左手 -> 旋转
                                else {
                                    targetRotation.y = (visualX - 0.25) * Math.PI * 1.5; 
                                    targetRotation.x = (visualY - 0.5) * Math.PI * 0.8;
                                }
                            }
                        }

                        // 如果这帧没有处理右手逻辑，重置状态以便下次抬手重新计算相对差值
                        if (!rightHandProcessed) isRightPanning = false;

                    } else {
                        // 丢失双手，完美平滑归位
                        if (isHandControlling && !handLostTimeout) {
                            handLostTimeout = setTimeout(() => {
                                isHandControlling = false;
                                isRightPanning = false; // 重置平移引擎
                                targetRotation.x = 0; targetRotation.y = 0; targetScale = 1.0;
                                targetPosition.x = 0; targetPosition.y = baseYOffset;
                            }, 400); 
                        }
                    }
                });

                // 优先检查并请求摄像头权限，拦截拒绝错误，防止三方库报错崩溃
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                        .then((stream) => {
                            // 权限获取成功，关闭测试流，交由 MediaPipe 接管
                            stream.getTracks().forEach(track => track.stop());

                            // 动态分配摄像头分辨率，减轻手机压力
                            const camWidth = isMobile ? 480 : 640;
                            const camHeight = isMobile ? 640 : 480;

                            const cameraUtils = new window.Camera(videoElement, {
                                onFrame: async () => { await hands.send({image: videoElement}); },
                                width: camWidth, height: camHeight,
                                facingMode: 'user' // 强制自拍摄像头
                            });
                            
                            cameraUtils.start().then(()=> {
                                updateStatus("光学手势追踪运行中", 'active');
                            }).catch(err => {
                                console.warn("相机启动异常", err);
                                updateStatus("相机异常，已切换触控", 'error');
                                setControlMode('mouse'); 
                            });
                        })
                        .catch((err) => {
                            // 捕获 NotAllowedError: Permission denied 等权限问题
                            console.warn("摄像头权限遭拒或环境不支持", err.message);
                            updateStatus("相机未授权，已切换触控", 'error');
                            setControlMode('mouse');
                        });
                } else {
                    console.warn("当前浏览器环境不支持 getUserMedia API");
                    updateStatus("环境受限，已切换触控", 'error');
                    setControlMode('mouse');
                }

            } catch (err) {
                console.warn("手势模块加载失败:", err.message);
                updateStatus("手势模块加载失败", 'error');
                setControlMode('mouse');
            }
        }

        // ==========================================
        // 动画引擎
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            if (controlMode === 'mouse') controls.update();

            // 流畅的阻尼插值系统
            currentRotation.x = lerp(currentRotation.x, targetRotation.x, 0.1);
            currentRotation.y = lerp(currentRotation.y, targetRotation.y, 0.1);
            maskGroup.rotation.x = currentRotation.x;
            maskGroup.rotation.y = currentRotation.y;

            currentScale = lerp(currentScale, targetScale, 0.1);
            maskGroup.scale.set(currentScale, currentScale, currentScale);

            currentPosition.x = lerp(currentPosition.x, targetPosition.x, 0.15); // 平移插值快一点手感更好
            currentPosition.y = lerp(currentPosition.y, targetPosition.y, 0.15);
            currentPosition.z = lerp(currentPosition.z, targetPosition.z, 0.15);

            const time = clock.getElapsedTime();

            // 叠加失重呼吸感动画
            if (controlMode === 'gesture' && !isHandControlling && targetScale === 1.0 && targetRotation.x === 0 && targetRotation.y === 0) {
                maskGroup.position.x = currentPosition.x;
                maskGroup.position.y = currentPosition.y + Math.sin(time * 1.2) * 0.15; 
                maskGroup.position.z = currentPosition.z;
            } else {
                maskGroup.position.set(currentPosition.x, currentPosition.y, currentPosition.z);
            }

            // 动画状态机
            if (introPhase === 1) {
                if (introStartTime === 0) introStartTime = time;
                if (time - introStartTime > 1.5) { introPhase = 2; introStartTime = time; }
            } else if (introPhase === 2) {
                const progress = (time - introStartTime) / 1.5;
                if (progress >= 1.0) {
                    introPhase = 3; 
                    modelData.forEach(data => {
                        data.meshMat.visible = false;
                        data.pointsMat.visible = true;
                    });
                } else {
                    const breathingBase = 0.3 + ((Math.sin(time * 2.0) + 1) / 2) * 0.7; 
                    modelData.forEach(data => {
                        data.meshMat.opacity = 1.0 - progress;
                        data.pointsMat.opacity = progress * breathingBase;
                    });
                }
            } else if (introPhase === 3) {
                const currentTheme = THEMES[currentThemeIndex];
                if (currentTheme.type !== 'solid_model') {
                    const breathingFactor = (Math.sin(time * 2.0) + 1) / 2; 
                    const currentOpacity = 0.3 + (breathingFactor * 0.7); 
                    modelData.forEach(data => { data.pointsMat.opacity = currentOpacity; });
                }
            }

            renderer.render(scene, camera);
        }
        
        animate();

    </script>
</body>
</html>
