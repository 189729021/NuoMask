<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西傩面具“开山” - 双模分工典藏版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                        serif: ['"Noto Serif SC"', 'serif'],
                    },
                    colors: {
                        amber: { 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24', 900: '#78350f' },
                        zinc: { 900: '#18181b', 950: '#09090b' }
                    }
                }
            }
        }
    </script>

    <style>
        /* 移动端防双击放大、防弹性滚动 */
        body { margin: 0; overflow: hidden; background-color: #000000; touch-action: none; -webkit-touch-callout: none; }
        
        #bg-container { position: absolute; inset: 0; background-color: #000; z-index: 1; }
        /* 镜像画面，并保持比例拉伸覆盖全屏 */
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: opacity 0.5s ease; filter: grayscale(20%) contrast(1.2); }
        
        #vignette { position: absolute; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.95) 100%); }

        #three-canvas { position: absolute; inset: 0; z-index: 2; outline: none; touch-action: none; }
        
        /* 移动端紧凑内边距 */
        #ui-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 1rem; }
        @media (min-width: 768px) { #ui-layer { padding: 2.5rem; } }
        
        .interactive-ui { pointer-events: auto; }
        
        .museum-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
        }

        input[type=range] { -webkit-appearance: none; background: transparent; height: 1px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #fde68a; cursor: pointer; margin-top: -7px;
            box-shadow: 0 0 10px rgba(253, 230, 138, 0.5);
            transition: transform 0.2s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; cursor: pointer; background: rgba(255, 255, 255, 0.2); }

        #info-card { transition: max-height 0.8s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden; }
        #info-content { transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); transform-origin: top; }

        #loading { position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000000; transition: opacity 1s ease; }
        .pulse-ring { width: 40px; height: 40px; border: 1px solid rgba(253, 230, 138, 0.3); border-radius: 50%; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; margin-bottom: 2rem; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .1; transform: scale(1.5); } }
    </style>
</head>
<body class="text-gray-200 selection:bg-amber-900/50 selection:text-amber-100">

    <div id="bg-container">
        <!-- 【修复核心1】：增加 muted 属性，解决 iOS/移动端浏览器无法自动拉起摄像头的策略限制 -->
        <video id="webcam" autoplay playsinline muted></video>
        <div id="vignette"></div>
    </div>

    <!-- 沉浸式博物馆启动屏 -->
    <div id="loading">
        <div class="pulse-ring"></div>
        <div class="font-serif text-lg tracking-[0.4em] text-amber-100/90 mb-2">正在提取数字藏品</div>
        <div id="loading-text" class="text-xs text-white/40 font-sans tracking-widest">LOADING ARTIFACT DATA...</div>
        <div id="error-msg" class="text-red-400 mt-6 text-sm max-w-md text-center font-sans tracking-wide px-4"></div>
    </div>

    <canvas id="three-canvas"></canvas>

    <div id="ui-layer">
        <div class="flex flex-col md:flex-row justify-between items-start w-full pointer-events-none gap-3">
            
            <!-- 左上角：典雅标题签 -->
            <div class="flex flex-col gap-2 md:gap-4 pointer-events-auto w-full md:w-auto">
                <div class="px-2">
                    <h1 class="font-serif text-3xl md:text-4xl text-amber-100/90 tracking-[0.2em] font-light mb-1 drop-shadow-md">开山</h1>
                    <div class="flex items-center gap-3">
                        <div class="h-px w-6 bg-amber-200/50"></div>
                        <p class="font-sans text-[10px] text-white/70 tracking-[0.3em] drop-shadow-md">江西傩文化 / 数字藏品</p>
                    </div>
                </div>

                <div id="status-badge" class="flex items-center gap-2.5 px-2 opacity-80 transition-opacity duration-1000 bg-black/30 w-max py-1 rounded-full md:bg-transparent md:p-0">
                    <div class="w-1.5 h-1.5 rounded-full bg-amber-200 animate-pulse ml-1 md:ml-0"></div>
                    <span id="status-text" class="font-sans text-[10px] text-amber-100/80 tracking-[0.1em] uppercase pr-2 md:pr-0">系统启动中...</span>
                </div>
            </div>

            <!-- 右上角：导览牌 (移动端紧凑布局) -->
            <div id="info-card" class="interactive-ui museum-panel p-1 w-full md:w-[280px] self-end md:self-auto shadow-2xl flex flex-col" style="max-height: 500px;">
                <div id="toggle-info-btn" class="px-4 py-3 md:px-5 md:py-4 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-colors border-b border-transparent">
                    <h2 class="font-serif text-xs font-medium tracking-[0.2em] text-amber-100/80">交互导览指南</h2>
                    <svg id="toggle-icon" class="w-4 h-4 text-white/60 transition-transform duration-700 transform rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                
                <div id="info-content" class="px-4 pb-4 md:px-5 md:pb-6 opacity-100 transform translate-y-0">
                    <p class="text-[10px] md:text-[11px] text-white/50 leading-loose mb-3 md:mb-5 font-sans font-light tracking-wide text-justify">
                        本展品支持移动端前置镜头三维空间手势追踪。请将设备稍微拿远，确保手掌完整入镜。
                    </p>
                    
                    <div class="space-y-3 font-sans text-[10px] md:text-[11px] tracking-widest font-light">
                        <div class="border-t border-white/10 pt-3">
                            <div class="text-[9px] text-amber-200/60 mb-1.5 uppercase font-medium">双手分工 Gesture</div>
                            <div class="space-y-2 ml-1">
                                <div class="flex justify-between items-center"><span class="text-white/50">右掌张开</span><span class="text-white/90 drop-shadow">空间平移</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/50">左掌张开</span><span class="text-white/90 drop-shadow">三维旋转</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/50">单次捏合</span><span class="text-amber-200/90 font-medium">切换颜色</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/50">双手开合</span><span class="text-white/90 drop-shadow">调节缩放</span></div>
                            </div>
                        </div>
                        
                        <div class="border-t border-white/10 pt-3">
                            <div class="text-[9px] text-amber-200/60 mb-1.5 uppercase font-medium">触控/鼠标 Touch</div>
                            <div class="space-y-2 ml-1">
                                <div class="flex justify-between items-center"><span class="text-white/50">单指滑动</span><span class="text-white/90 drop-shadow">藏品旋转</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/50">双指捏合</span><span class="text-white/90 drop-shadow">调节大小</span></div>
                                <div class="flex justify-between items-center"><span class="text-white/50">双击屏幕</span><span class="text-amber-200/90 font-medium">切换颜色</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部控制 -->
        <div class="interactive-ui flex justify-center w-full">
            <div class="museum-panel p-2.5 md:px-4 md:py-2 flex flex-col md:flex-row items-center gap-3 md:gap-6 w-full sm:w-auto rounded-xl md:rounded-full">
                
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <button id="mode-gesture" class="flex-1 md:flex-none px-2 py-2.5 md:px-5 md:py-2 rounded-lg md:rounded-full text-[11px] md:text-xs font-sans tracking-[0.1em] border border-amber-200/40 text-amber-200 bg-amber-900/30 transition-all duration-300">
                        前置手势
                    </button>
                    <button id="mode-mouse" class="flex-1 md:flex-none px-2 py-2.5 md:px-5 md:py-2 rounded-lg md:rounded-full text-[11px] md:text-xs font-sans tracking-[0.1em] text-white/50 hover:text-white/90 transition-all duration-300 border border-transparent bg-white/5 md:bg-transparent">
                        屏幕触控
                    </button>
                </div>

                <div class="hidden md:block w-px h-6 bg-white/20"></div>

                <div class="flex items-center justify-between md:justify-start gap-4 px-2 w-full md:w-auto mt-1 md:mt-0">
                    <span class="font-serif text-[10px] text-white/50 tracking-widest uppercase">实景透射</span>
                    <div class="flex-1 md:w-32">
                        <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // UI 交互与移动端自适应折叠
        // ==========================================
        const infoCard = document.getElementById('info-card');
        const infoContent = document.getElementById('info-content');
        const toggleIcon = document.getElementById('toggle-icon');
        const toggleBtn = document.getElementById('toggle-info-btn');
        let isCardOpen = true;
        
        // 移动端判断：屏幕宽度小于768px
        const isMobile = window.innerWidth < 768;

        function toggleCardState() {
            isCardOpen = !isCardOpen;
            if (isCardOpen) {
                infoContent.style.opacity = '1';
                infoContent.style.transform = 'translateY(0)';
                infoCard.style.maxHeight = isMobile ? '400px' : '500px';
                toggleBtn.classList.remove('border-white/10');
                toggleBtn.classList.add('border-transparent');
                toggleIcon.style.transform = 'rotate(0deg)';
            } else {
                infoContent.style.opacity = '0';
                infoContent.style.transform = 'translateY(-10px)';
                infoCard.style.maxHeight = isMobile ? '46px' : '52px';
                toggleBtn.classList.remove('border-transparent');
                toggleBtn.classList.add('border-white/10');
                toggleIcon.style.transform = 'rotate(180deg)';
            }
        }

        toggleBtn.addEventListener('click', toggleCardState);

        // 【移动端优化】：手机屏幕太小，加载完成后迅速自动折叠面板，让出视野
        setTimeout(() => { if (isCardOpen) toggleCardState(); }, isMobile ? 3000 : 6000);

        // ==========================================
        // 基础配置
        // ==========================================
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/189729021/-@main/nuo-v1.glb';
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('three-canvas');
        const opacitySlider = document.getElementById('opacity-slider');
        const statusText = document.getElementById('status-text');
        const statusBadge = document.getElementById('status-badge');
        
        opacitySlider.addEventListener('input', (e) => {
            videoElement.style.opacity = e.target.value;
        });
        videoElement.style.opacity = opacitySlider.value;

        let maskGroup = new THREE.Group(); 
        const baseYOffset = -2.0; 
        
        let controlMode = 'gesture'; 
        
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let targetScale = 1.0;
        let currentScale = 1.0;
        let targetPosition = { x: 0, y: baseYOffset, z: 0 };
        let currentPosition = { x: 0, y: baseYOffset, z: 0 };

        let introPhase = 0; 
        let introStartTime = 0;

        const THEMES = [
            { type: 'particle_original' },              
            { type: 'particle_pure', hex: 0xffffff },   
            { type: 'particle_pure', hex: 0xff3333 },   
            { type: 'solid_model' }                     
        ];
        let currentThemeIndex = 0; 
        const modelData = []; 
        
        let lastPinchTime = 0;
        let wasPinching = false;
        let rightHandWasOpen = false;
        let lastHandPos = { x: 0, y: 0 };

        const lerp = (start, end, factor) => start + (end - start) * factor;

        const updateStatus = (msg, isError = false) => {
            statusText.textContent = msg;
            const dot = statusBadge.querySelector('div');
            statusBadge.style.opacity = '1';
            
            if(isError) {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_#ef4444]';
                statusText.className = 'font-sans text-[10px] text-red-300 tracking-[0.1em] uppercase pr-2 md:pr-0';
            } else if (controlMode === 'gesture') {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-amber-200 animate-pulse shadow-[0_0_5px_#fde68a]';
                statusText.className = 'font-sans text-[10px] text-amber-100/90 tracking-[0.1em] uppercase pr-2 md:pr-0';
                setTimeout(() => statusBadge.style.opacity = '0.5', 3000);
            } else {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-white/70';
                statusText.className = 'font-sans text-[10px] text-white/70 tracking-[0.1em] uppercase pr-2 md:pr-0';
            }
        };

        const showError = (msg) => {
            const loadingWrapper = document.getElementById('loading');
            loadingWrapper.querySelector('.pulse-ring').style.display = 'none';
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('error-msg').innerHTML = msg;
        }

        function triggerThemeSwitch() {
            currentThemeIndex = (currentThemeIndex + 1) % THEMES.length;
            const theme = THEMES[currentThemeIndex];
            
            modelData.forEach(data => {
                const pMat = data.pointsMat;
                const mMat = data.meshMat;

                if (theme.type === 'solid_model') {
                    mMat.opacity = 1.0; mMat.visible = true; pMat.visible = false;
                } else {
                    mMat.visible = false; pMat.visible = true;
                    if (theme.type === 'particle_original') {
                        pMat.vertexColors = data.hasVertexColors;
                        pMat.color = data.hasVertexColors ? new THREE.Color(0xffffff) : data.originalColor.clone();
                    } else {
                        pMat.vertexColors = false; pMat.color.setHex(theme.hex);
                    }
                    pMat.needsUpdate = true;
                }
            });
            targetScale = 0.6; 
            setTimeout(()=> { targetScale = 1.0 }, 150);
        }

        // ==========================================
        // Three.js 场景与兼容控制
        // ==========================================
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0); 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.6; 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enabled = false; 
        controls.minDistance = 5;
        controls.maxDistance = 30;
        controls.enablePan = false;

        // 【移动端修复】：PC端双击与移动端单指连续点击的兼顾
        canvasElement.addEventListener('dblclick', () => {
            if (controlMode === 'mouse' && introPhase === 3) triggerThemeSwitch();
        });
        
        let lastTapTime = 0;
        canvasElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) { 
                const currentTime = Date.now();
                const tapLength = currentTime - lastTapTime;
                if (tapLength > 0 && tapLength < 300) { 
                    if (controlMode === 'mouse' && introPhase === 3) triggerThemeSwitch();
                    e.preventDefault();
                }
                lastTapTime = currentTime;
            }
        }, { passive: false });

        // 按钮切换逻辑
        const btnGesture = document.getElementById('mode-gesture');
        const btnMouse = document.getElementById('mode-mouse');
        
        // 分别定义响应式激活样式
        const gestureActive = "flex-1 md:flex-none px-2 py-2.5 md:px-5 md:py-2 rounded-lg md:rounded-full text-[11px] md:text-xs font-sans tracking-[0.1em] border border-amber-200/40 text-amber-200 bg-amber-900/30 transition-all duration-300";
        const gestureIdle = "flex-1 md:flex-none px-2 py-2.5 md:px-5 md:py-2 rounded-lg md:rounded-full text-[11px] md:text-xs font-sans tracking-[0.1em] text-white/50 hover:text-white/90 transition-all duration-300 border border-transparent bg-white/5 md:bg-transparent";
        
        function setControlMode(mode) {
            controlMode = mode;
            if (mode === 'mouse') {
                btnGesture.className = gestureIdle;
                btnMouse.className = gestureActive;
                
                controls.enabled = true;
                targetRotation = { x: 0, y: 0 };
                targetPosition = { x: 0, y: baseYOffset, z: 0 };
                targetScale = 1.0;
                
                updateStatus("屏幕触控已接管", false);
            } else {
                btnMouse.className = gestureIdle;
                btnGesture.className = gestureActive;
                
                controls.enabled = false;
                camera.position.set(0, 0, 15);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                
                updateStatus("前置光学追踪中", false);
            }
        }

        btnGesture.addEventListener('click', () => setControlMode('gesture'));
        btnMouse.addEventListener('click', () => setControlMode('mouse'));

        const ambientLight = new THREE.AmbientLight(0xfff4e6, 0.4); 
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffeedd, 2.0); 
        directionalLight.position.set(5, 12, 6);
        scene.add(directionalLight);
        scene.add(maskGroup); 

        // ==========================================
        // 加载模型
        // ==========================================
        const loader = new GLTFLoader();
        
        loader.load(MODEL_URL, (gltf) => {
            try {
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material.transparent = true;
                        child.material.opacity = 1.0; 
                        child.material.needsUpdate = true;

                        const hasVertexColors = child.geometry.hasAttribute('color');
                        const origMaterialColor = child.material.color ? child.material.color.clone() : new THREE.Color(0xffffff);

                        const pointsMat = new THREE.PointsMaterial({
                            size: 0.05, 
                            vertexColors: hasVertexColors, 
                            color: hasVertexColors ? 0xffffff : origMaterialColor,
                            transparent: true,
                            opacity: 0.0, 
                            blending: THREE.AdditiveBlending, 
                            depthWrite: false, 
                            sizeAttenuation: true 
                        });

                        const points = new THREE.Points(child.geometry, pointsMat);
                        child.add(points); 
                        
                        modelData.push({
                            mesh: child,
                            meshMat: child.material,
                            pointsMat: pointsMat,
                            hasVertexColors: hasVertexColors,
                            originalColor: origMaterialColor
                        });
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                model.position.x -= center.x;
                model.position.y -= center.y;
                model.position.z -= center.z;

                const maxDim = Math.max(size.x, size.y, size.z);
                // 【移动端适配】：如果在小屏幕上，模型稍微缩小一点以适应竖屏视野
                const targetSize = isMobile ? 8 : 10;
                const scaleFactor = maxDim === 0 ? 1 : targetSize / maxDim;
                
                model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                maskGroup.position.y = baseYOffset;

                modelData.forEach(data => { data.pointsMat.size = targetSize * 0.005; });

                maskGroup.add(model);
                
                const loadingEl = document.getElementById('loading');
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.style.display = 'none', 1000);
                
                introPhase = 1;
                updateStatus("视觉模块加载就绪");
                initMediaPipe();

            } catch(err) {
                showError("数据解析异常: " + err.message);
            }
        }, undefined, (err) => { showError("请检查网络。"); });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // MediaPipe 初始化与移动端摄像头适配
        // ==========================================
        function initMediaPipe() {
            try {
                const hands = new window.Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                
                hands.onResults((results) => {
                    if (controlMode !== 'gesture') return;

                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        const detectedHands = results.multiHandLandmarks;

                        if (detectedHands.length === 2) {
                            const distance = Math.hypot(detectedHands[0][8].x - detectedHands[1][8].x, detectedHands[0][8].y - detectedHands[1][8].y);
                            targetScale = distance * 3.5; 
                            targetScale = Math.max(0.4, Math.min(targetScale, 3.0));
                            
                            targetRotation.x = 0; targetRotation.y = 0;
                            targetPosition.x = 0; targetPosition.y = baseYOffset;
                            rightHandWasOpen = false;
                        } 
                        else if (detectedHands.length === 1) {
                            const hand = detectedHands[0];
                            const isRightHand = results.multiHandedness[0].label === 'Left';

                            const visualX = 1.0 - hand[9].x;
                            const visualY = hand[9].y;

                            const pinchDist = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
                            const isPinching = pinchDist < 0.04;

                            if (isPinching) {
                                if (!wasPinching) {
                                    lastPinchTime = Date.now();
                                }
                                rightHandWasOpen = false; 
                            } else {
                                if (wasPinching) {
                                    if (introPhase === 3 && Date.now() - lastPinchTime < 500) {
                                        triggerThemeSwitch();
                                    }
                                }
                                
                                if (isRightHand) {
                                    if (!rightHandWasOpen) {
                                        lastHandPos = { x: visualX, y: visualY };
                                        rightHandWasOpen = true;
                                    } else {
                                        targetPosition.x += (visualX - lastHandPos.x) * 15.0;
                                        targetPosition.y -= (visualY - lastHandPos.y) * 15.0; 
                                        lastHandPos = { x: visualX, y: visualY };
                                    }
                                } else {
                                    targetRotation.y = (visualX - 0.5) * Math.PI; 
                                    targetRotation.x = (visualY - 0.5) * Math.PI * 0.8;
                                    rightHandWasOpen = false;
                                }
                            }
                            wasPinching = isPinching;
                        }
                    } else {
                        targetRotation.x = 0; targetRotation.y = 0; targetScale = 1.0;
                        targetPosition.x = 0; targetPosition.y = baseYOffset;
                        wasPinching = false; rightHandWasOpen = false;
                    }
                });

                // 【修复核心2】：显式请求 facingMode: 'user' 保证移动端必定调用前置镜头
                const cameraUtils = new window.Camera(videoElement, {
                    onFrame: async () => { await hands.send({image: videoElement}); },
                    width: isMobile ? 480 : 640,  // 根据设备降低请求分辨率，提高帧率
                    height: isMobile ? 640 : 480,
                    facingMode: 'user' 
                });
                
                cameraUtils.start().then(()=> {
                    updateStatus("前置手势追踪运行中");
                }).catch(err => {
                    updateStatus("相机未授权，已切换触控", true);
                    setControlMode('mouse'); 
                });

            } catch (err) {
                updateStatus("手势异常，已切换触控", true);
                setControlMode('mouse');
            }
        }

        // ==========================================
        // 动画循环
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            if (controlMode === 'mouse') controls.update();

            currentRotation.x = lerp(currentRotation.x, targetRotation.x, 0.1);
            currentRotation.y = lerp(currentRotation.y, targetRotation.y, 0.1);
            maskGroup.rotation.x = currentRotation.x;
            maskGroup.rotation.y = currentRotation.y;

            currentScale = lerp(currentScale, targetScale, 0.1);
            maskGroup.scale.set(currentScale, currentScale, currentScale);

            currentPosition.x = lerp(currentPosition.x, targetPosition.x, 0.08);
            currentPosition.y = lerp(currentPosition.y, targetPosition.y, 0.08);
            currentPosition.z = lerp(currentPosition.z, targetPosition.z, 0.08);

            const time = clock.getElapsedTime();

            if (controlMode === 'gesture' && !rightHandWasOpen && targetScale === 1.0 && targetRotation.x === 0 && targetRotation.y === 0) {
                maskGroup.position.x = currentPosition.x;
                maskGroup.position.y = currentPosition.y + Math.sin(time * 1.2) * 0.15; 
                maskGroup.position.z = currentPosition.z;
            } else {
                maskGroup.position.set(currentPosition.x, currentPosition.y, currentPosition.z);
            }

            if (introPhase === 1) {
                if (introStartTime === 0) introStartTime = time;
                if (time - introStartTime > 1.5) { introPhase = 2; introStartTime = time; }
            } else if (introPhase === 2) {
                const progress = (time - introStartTime) / 1.5;
                if (progress >= 1.0) {
                    introPhase = 3; 
                    modelData.forEach(data => {
                        data.meshMat.visible = false;
                        data.pointsMat.visible = true;
                    });
                } else {
                    const breathingBase = 0.3 + ((Math.sin(time * 2.0) + 1) / 2) * 0.7; 
                    modelData.forEach(data => {
                        data.meshMat.opacity = 1.0 - progress;
                        data.pointsMat.opacity = progress * breathingBase;
                    });
                }
            } else if (introPhase === 3) {
                const currentTheme = THEMES[currentThemeIndex];
                if (currentTheme.type !== 'solid_model') {
                    const breathingFactor = (Math.sin(time * 2.0) + 1) / 2; 
                    const currentOpacity = 0.3 + (breathingFactor * 0.7); 
                    modelData.forEach(data => { data.pointsMat.opacity = currentOpacity; });
                }
            }

            renderer.render(scene, camera);
        }
        
        animate();

    </script>
</body>
</html>
