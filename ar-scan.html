<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>傩面具 - AR数字明信片系列</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { amber: { 100: '#fef3c7', 200: '#fde68a', 900: '#78350f' } } } } }

        // 参数化线稿材质组件
        AFRAME.registerComponent('ar-mask-effects', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const obj = this.el.getObject3D('mesh');
                    if(obj) {
                        obj.traverse((child) => {
                            if (child.isMesh) {
                                const edges = new THREE.EdgesGeometry(child.geometry, 30);
                                const lineMat = new THREE.LineBasicMaterial({ color: 0xfde68a, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
                                const lines = new THREE.LineSegments(edges, lineMat);
                                child.add(lines);
                                child.material.transparent = true; 
                                child.material.opacity = 0.8; 
                                child.material.color = new THREE.Color(0x111111);
                            }
                        });
                    }
                });
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
            const enterBtn = document.querySelector('#enter-btn');
            const scanPrompt = document.querySelector('#scan-prompt');
            const scanBox = document.querySelector('#scan-box');
            
            // 当前要跳转的展厅链接
            let currentMuseumUrl = "";

            // 配置 5 张明信片数据 (真实名称已更新)
            const cardsData = [
                { id: 0, name: "开山", url: "https://189729021.github.io/NuoMask/museum-0.html" },
                { id: 1, name: "羌姆金刚", url: "https://189729021.github.io/NuoMask/museum-1.html" },
                { id: 2, name: "方相氏", url: "https://189729021.github.io/NuoMask/museum-2.html" },
                { id: 3, name: "湘东虎面", url: "https://189729021.github.io/NuoMask/museum-3.html" },
                { id: 4, name: "殷郊", url: "https://189729021.github.io/NuoMask/museum-4.html" }
            ];

            // 监听 5 个目标的识别状态
            cardsData.forEach(card => {
                const targetEl = document.querySelector(`#target-${card.id}`);
                if (!targetEl) return;
                
                targetEl.addEventListener("targetFound", event => {
                    scanPrompt.innerHTML = `已识别：${card.name}面具`; 
                    scanBox.classList.add('scale-110', 'opacity-0');
                    currentMuseumUrl = card.url; // 更新对应跳转链接
                    
                    setTimeout(() => {
                        enterBtn.classList.remove('translate-y-10', 'opacity-0');
                        enterBtn.classList.add('translate-y-0', 'opacity-100');
                        enterBtn.style.pointerEvents = 'auto';
                    }, 500);
                });

                targetEl.addEventListener("targetLost", event => {
                    enterBtn.classList.remove('translate-y-0', 'opacity-100');
                    enterBtn.classList.add('translate-y-10', 'opacity-0');
                    enterBtn.style.pointerEvents = 'none';
                    scanPrompt.innerHTML = "请将镜头对准明信片正面";
                    scanBox.classList.remove('scale-110', 'opacity-0');
                });
            });

            // 点击按钮跳转
            enterBtn.addEventListener('click', () => {
                if(currentMuseumUrl) window.location.href = currentMuseumUrl;
            });
        });
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Noto Sans SC', sans-serif; }
        .scan-corner { width: 30px; height: 30px; border-color: rgba(253, 230, 138, 0.8); position: absolute; transition: all 0.5s ease; }
        .corner-tl { border-top: 2px solid; border-left: 2px solid; top: 0; left: 0; }
        .corner-tr { border-top: 2px solid; border-right: 2px solid; top: 0; right: 0; }
        .corner-bl { border-bottom: 2px solid; border-left: 2px solid; bottom: 0; left: 0; }
        .corner-br { border-bottom: 2px solid; border-right: 2px solid; bottom: 0; right: 0; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body>
    <!-- UI 覆盖层 -->
    <div class="absolute inset-0 z-50 pointer-events-none flex flex-col items-center justify-center p-6">
        <div id="scan-box" class="relative w-64 h-80 transition-all duration-700 ease-in-out">
            <div class="scan-corner corner-tl"></div><div class="scan-corner corner-tr"></div>
            <div class="scan-corner corner-bl"></div><div class="scan-corner corner-br"></div>
            <div class="absolute top-0 left-0 w-full h-[1px] bg-amber-200/50 shadow-[0_0_8px_#fde68a] animate-[scan_2.5s_ease-in-out_infinite]"></div>
        </div>
        <div id="scan-prompt" class="mt-8 text-amber-100/80 text-sm tracking-widest transition-opacity duration-500 bg-black/40 px-4 py-2 rounded-full backdrop-blur-sm border border-white/10">请将镜头对准明信片正面</div>
        <button id="enter-btn" class="absolute bottom-16 px-8 py-3 bg-amber-900/80 border border-amber-200/50 text-amber-200 text-sm tracking-[0.2em] rounded-full shadow-[0_0_20px_rgba(253,230,138,0.2)] backdrop-blur-md transform translate-y-10 opacity-0 transition-all duration-700 pointer-events-none hover:bg-amber-800 hover:scale-105 active:scale-95">进入数字全息展厅</button>
    </div>

    <!-- 核心 AR 场景：关联你的 targets.mind -->
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/189729021/-@main/targets.mind; autoStart: true;" 
             renderer="colorManagement: true; physicallyCorrectLights: true;"
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- 预加载 5 个模型 -->
            <a-asset-item id="model0" src="https://cdn.jsdelivr.net/gh/189729021/-@main/model-0.glb"></a-asset-item>
            <a-asset-item id="model1" src="https://cdn.jsdelivr.net/gh/189729021/-@main/model-1.glb"></a-asset-item>
            <a-asset-item id="model2" src="https://cdn.jsdelivr.net/gh/189729021/-@main/model-2.glb"></a-asset-item>
            <a-asset-item id="model3" src="https://cdn.jsdelivr.net/gh/189729021/-@main/model-3.glb"></a-asset-item>
            <a-asset-item id="model4" src="https://cdn.jsdelivr.net/gh/189729021/-@main/model-4.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 目标 0 (开山) -->
        <a-entity id="target-0" mindar-image-target="targetIndex: 0">
            <a-light type="ambient" color="#fff4e6" intensity="0.8"></a-light><a-light type="directional" color="#ffeedd" intensity="1.5" position="0.5 1 1"></a-light>
            <a-gltf-model src="#model0" position="0 0 0.1" scale="0.08 0.08 0.08" rotation="90 0 0" ar-mask-effects animation="property: position; to: 0 0 0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-gltf-model>
        </a-entity>

        <!-- 目标 1 (羌姆金刚) -->
        <a-entity id="target-1" mindar-image-target="targetIndex: 1">
            <a-light type="ambient" color="#fff4e6" intensity="0.8"></a-light><a-light type="directional" color="#ffeedd" intensity="1.5" position="0.5 1 1"></a-light>
            <a-gltf-model src="#model1" position="0 0 0.1" scale="0.08 0.08 0.08" rotation="90 0 0" ar-mask-effects animation="property: position; to: 0 0 0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-gltf-model>
        </a-entity>

        <!-- 目标 2 (方相氏) -->
        <a-entity id="target-2" mindar-image-target="targetIndex: 2">
            <a-light type="ambient" color="#fff4e6" intensity="0.8"></a-light><a-light type="directional" color="#ffeedd" intensity="1.5" position="0.5 1 1"></a-light>
            <a-gltf-model src="#model2" position="0 0 0.1" scale="0.08 0.08 0.08" rotation="90 0 0" ar-mask-effects animation="property: position; to: 0 0 0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-gltf-model>
        </a-entity>

        <!-- 目标 3 (湘东虎面) -->
        <a-entity id="target-3" mindar-image-target="targetIndex: 3">
            <a-light type="ambient" color="#fff4e6" intensity="0.8"></a-light><a-light type="directional" color="#ffeedd" intensity="1.5" position="0.5 1 1"></a-light>
            <a-gltf-model src="#model3" position="0 0 0.1" scale="0.08 0.08 0.08" rotation="90 0 0" ar-mask-effects animation="property: position; to: 0 0 0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-gltf-model>
        </a-entity>

        <!-- 目标 4 (殷郊) -->
        <a-entity id="target-4" mindar-image-target="targetIndex: 4">
            <a-light type="ambient" color="#fff4e6" intensity="0.8"></a-light><a-light type="directional" color="#ffeedd" intensity="1.5" position="0.5 1 1"></a-light>
            <a-gltf-model src="#model4" position="0 0 0.1" scale="0.08 0.08 0.08" rotation="90 0 0" ar-mask-effects animation="property: position; to: 0 0 0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-gltf-model>
        </a-entity>
        
    </a-scene>
</body>
</html>
