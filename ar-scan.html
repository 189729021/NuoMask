<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开山 - AR数字明信片</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.4.2/dist/aframe-master.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { amber: { 100: '#fef3c7', 200: '#fde68a', 900: '#78350f' } } } }
        }

        AFRAME.registerComponent('ar-mask-effects', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const obj = this.el.getObject3D('mesh');
                    obj.traverse((child) => {
                        if (child.isMesh) {
                            const edges = new THREE.EdgesGeometry(child.geometry, 30);
                            const lineMat = new THREE.LineBasicMaterial({
                                color: 0xfde68a, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false
                            });
                            const lines = new THREE.LineSegments(edges, lineMat);
                            child.add(lines);
                            child.material.transparent = true;
                            child.material.opacity = 0.8;
                            child.material.color = new THREE.Color(0x111111);
                        }
                    });
                });
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
            const target = document.querySelector('#image-target');
            const enterBtn = document.querySelector('#enter-btn');
            const scanPrompt = document.querySelector('#scan-prompt');
            const scanBox = document.querySelector('#scan-box');

            target.addEventListener("targetFound", event => {
                scanPrompt.classList.add('opacity-0');
                scanBox.classList.add('scale-110', 'opacity-0');
                setTimeout(() => {
                    enterBtn.classList.remove('translate-y-10', 'opacity-0');
                    enterBtn.classList.add('translate-y-0', 'opacity-100');
                    enterBtn.style.pointerEvents = 'auto';
                }, 500);
            });

            target.addEventListener("targetLost", event => {
                enterBtn.classList.remove('translate-y-0', 'opacity-100');
                enterBtn.classList.add('translate-y-10', 'opacity-0');
                enterBtn.style.pointerEvents = 'none';
                scanPrompt.classList.remove('opacity-0');
                scanBox.classList.remove('scale-110', 'opacity-0');
            });

            enterBtn.addEventListener('click', () => {
                // 【已修改】这里指向了你即将部署在 Github Pages 上的数字展厅页面
                // 假设你的 Github 用户名是 189729021，你新建的网页仓库名为 NuoMask
                // 如果你修改了仓库名，请记得更新下面这个链接中的 "NuoMask"
                window.location.href = "https://189729021.github.io/NuoMask/museum.html";
            });
        });
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Noto Sans SC', sans-serif; }
        .scan-corner { width: 30px; height: 30px; border-color: rgba(253, 230, 138, 0.8); position: absolute; transition: all 0.5s ease; }
        .corner-tl { border-top: 2px solid; border-left: 2px solid; top: 0; left: 0; }
        .corner-tr { border-top: 2px solid; border-right: 2px solid; top: 0; right: 0; }
        .corner-bl { border-bottom: 2px solid; border-left: 2px solid; bottom: 0; left: 0; }
        .corner-br { border-bottom: 2px solid; border-right: 2px solid; bottom: 0; right: 0; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body>
    <div class="absolute inset-0 z-50 pointer-events-none flex flex-col items-center justify-center p-6">
        <div id="scan-box" class="relative w-64 h-80 transition-all duration-700 ease-in-out">
            <div class="scan-corner corner-tl"></div>
            <div class="scan-corner corner-tr"></div>
            <div class="scan-corner corner-bl"></div>
            <div class="scan-corner corner-br"></div>
            <div class="absolute top-0 left-0 w-full h-[1px] bg-amber-200/50 shadow-[0_0_8px_#fde68a] animate-[scan_2.5s_ease-in-out_infinite]"></div>
        </div>
        <div id="scan-prompt" class="mt-8 text-amber-100/80 text-sm tracking-widest transition-opacity duration-500 bg-black/40 px-4 py-2 rounded-full backdrop-blur-sm border border-white/10">
            请将镜头对准《开山》明信片正面
        </div>
        <button id="enter-btn" class="absolute bottom-16 px-8 py-3 bg-amber-900/80 border border-amber-200/50 text-amber-200 text-sm tracking-[0.2em] rounded-full shadow-[0_0_20px_rgba(253,230,138,0.2)] backdrop-blur-md transform translate-y-10 opacity-0 transition-all duration-700 pointer-events-none hover:bg-amber-800 hover:scale-105 active:scale-95">
            进入数字全息展厅
        </button>
    </div>

    <!-- imageTargetSrc 已指向你的 Github 仓库下的 targets.mind 文件 -->
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/189729021/-@main/targets.mind; autoStart: true;" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="nuoModel" src="https://cdn.jsdelivr.net/gh/189729021/-@main/nuo-v1.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="image-target" mindar-image-target="targetIndex: 0">
            <a-light type="ambient" color="#fff4e6" intensity="0.8"></a-light>
            <a-light type="directional" color="#ffeedd" intensity="1.5" position="0.5 1 1"></a-light>
            <a-gltf-model src="#nuoModel" position="0 0 0.1" scale="0.08 0.08 0.08" rotation="90 0 0" ar-mask-effects animation="property: position; to: 0 0 0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-gltf-model>
        </a-entity>
    </a-scene>
</body>
</html>
